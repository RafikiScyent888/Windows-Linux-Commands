<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Blitz — CLI Command Arcade</title>
  <meta name="theme-color" content="#7c3aed" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><text y=%2220%22 font-size=%2222%22>⚡</text></svg>" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-depth="1">
  <div class="app-shell">
    <header class="topbar" id="topbar"></header>

    <div class="game-header">
      <div class="game-title">
        <span class="tile-icon" style="background:linear-gradient(150deg,#fef08a,#7c3aed); color:#2a1250;" id="mode-icon"></span>
        <h1>Blitz</h1>
      </div>
      <div class="hud">
        <div class="hud-stat"><span>Score</span><span id="hud-score">0</span></div>
        <div class="hud-stat"><span>Streak</span><span id="hud-streak">0</span></div>
        <div class="hud-stat"><span>Time</span><span id="hud-time">60</span></div>
        <button class="btn btn-ghost" id="pause-btn" aria-label="Pause"></button>
      </div>
    </div>

    <div class="blitz-timer-bar"><div class="blitz-timer-fill" id="timer-fill"></div></div>

    <main class="card-stage" id="game-area">
      <div class="quiz-card">
        <div class="quiz-prompt-label">Quick! What does this command do?</div>
        <div class="quiz-prompt" id="quiz-acronym">AAA</div>
        <div class="quiz-options" id="quiz-options"></div>
      </div>
    </main>

    <div class="card-stage" id="start-area">
      <div class="quiz-card">
        <span class="tile-icon" style="background:linear-gradient(150deg,#fef08a,#7c3aed); color:#2a1250; margin:0 auto 14px;"></span>
        <h2 style="margin-top:0;">Ready for Blitz mode?</h2>
        <p class="center-note">Answer as many commands correctly as you can in 60 seconds. Wrong answers break your streak but don't cost time.</p>
        <button class="btn btn-primary btn-block" id="start-btn">Start Blitz</button>
      </div>
    </div>

    <div class="results-card" id="results" hidden>
      <span class="tile-icon" style="background:linear-gradient(150deg,#fef08a,#7c3aed); color:#2a1250; margin:0 auto;" id="results-icon"></span>
      <h2>Time's up!</h2>
      <div class="big-score" id="res-score">0</div>
      <div class="results-stats">
        <div><div class="num" id="res-streak">0</div><div class="lab">Best streak</div></div>
        <div><div class="num" id="res-accuracy">0%</div><div class="lab">Accuracy</div></div>
        <div><div class="num" id="res-best">0</div><div class="lab">Best score</div></div>
      </div>
      <div class="results-actions">
        <button class="btn btn-primary" id="play-again-btn">Blitz again</button>
        <a class="btn btn-ghost" href="../index.html">Dashboard</a>
      </div>
    </div>

    <footer class="site-footer" id="site-footer"></footer>
  </div>

  <script src="../js/acronyms-data.js"></script>
  <script src="../js/common.js"></script>
  <script>
    renderTopbar();
    renderFooter("site-footer");
    document.getElementById("pause-btn").innerHTML = ICONS.pause;
    document.getElementById("mode-icon").innerHTML = ICONS.bolt;
    document.getElementById("results-icon").innerHTML = ICONS.trophy;
    document.querySelector("#start-area .tile-icon").innerHTML = ICONS.bolt;

    const ROUND_SECONDS = 60;
    const OPTION_COUNT = 4;

    const gameArea = document.getElementById("game-area");
    const startArea = document.getElementById("start-area");
    const resultsEl = document.getElementById("results");
    const acronymEl = document.getElementById("quiz-acronym");
    const optionsEl = document.getElementById("quiz-options");
    const hudScore = document.getElementById("hud-score");
    const hudStreak = document.getElementById("hud-streak");
    const hudTime = document.getElementById("hud-time");
    const timerFill = document.getElementById("timer-fill");

    let queue, score, streak, bestStreak, correctCount, totalCount, timeLeft, timerHandle, answered;

    function refillQueue() {
      queue = shuffleArray(ACRONYMS);
    }

    function nextItem() {
      if (queue.length === 0) refillQueue();
      return queue.pop();
    }

    function startGame() {
      startArea.hidden = true;
      resultsEl.hidden = true;
      gameArea.hidden = false;
      score = 0;
      streak = 0;
      bestStreak = 0;
      correctCount = 0;
      totalCount = 0;
      timeLeft = ROUND_SECONDS;
      refillQueue();
      updateHud();
      renderQuestion();
      clearInterval(timerHandle);
      timerHandle = setInterval(tick, 1000);
    }

    function tick() {
      if (pauseCtl.paused) return;
      timeLeft--;
      updateHud();
      if (timeLeft <= 0) finishGame();
    }

    function updateHud() {
      hudScore.textContent = score;
      hudStreak.textContent = streak;
      hudTime.textContent = timeLeft;
      timerFill.style.width = `${(timeLeft / ROUND_SECONDS) * 100}%`;
    }

    function renderQuestion() {
      answered = false;
      const item = nextItem();
      const distractors = pickDistractors(item, ACRONYMS, OPTION_COUNT - 1);
      const options = shuffleArray([item, ...distractors]);
      acronymEl.textContent = item.acronym;
      optionsEl.innerHTML = "";
      options.forEach((opt) => {
        const btn = document.createElement("button");
        btn.className = "quiz-option";
        btn.textContent = opt.definition;
        btn.addEventListener("click", () => selectOption(btn, opt, item));
        optionsEl.appendChild(btn);
      });
    }

    function selectOption(btn, opt, item) {
      if (answered || pauseCtl.paused || timeLeft <= 0) return;
      answered = true;
      totalCount++;
      const correct = opt.id === item.id;
      if (correct) {
        btn.classList.add("correct");
        score++;
        streak++;
        correctCount++;
        bestStreak = Math.max(bestStreak, streak);
      } else {
        btn.classList.add("wrong");
        streak = 0;
        [...optionsEl.children].forEach((child) => {
          if (child.textContent === item.definition) child.classList.add("correct");
        });
      }
      updateHud();
      setTimeout(() => {
        if (timeLeft > 0) renderQuestion();
      }, 350);
    }

    function finishGame() {
      clearInterval(timerHandle);
      gameArea.hidden = true;
      resultsEl.hidden = false;
      const accuracy = totalCount ? Math.round((correctCount / totalCount) * 100) : 0;
      document.getElementById("res-score").textContent = score;
      document.getElementById("res-streak").textContent = bestStreak;
      document.getElementById("res-accuracy").textContent = `${accuracy}%`;
      const improved = Scores.setBestIfBetter("blitz-score", score, true);
      document.getElementById("res-best").textContent = Scores.getBest("blitz-score");
      if (improved) showToast("New high score!");
    }

    document.getElementById("start-btn").addEventListener("click", startGame);
    document.getElementById("play-again-btn").addEventListener("click", startGame);

    const pauseCtl = new PauseController();
    document.getElementById("pause-btn").addEventListener("click", () => pauseCtl.pause());

    gameArea.hidden = true;
    resultsEl.hidden = true;
  </script>
</body>
</html>
