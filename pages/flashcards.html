<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Flashcards — CLI Command Arcade</title>
  <meta name="theme-color" content="#059669" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22><text y=%2220%22 font-size=%2222%22>⚡</text></svg>" />
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body data-depth="1">
  <div class="app-shell">
    <header class="topbar" id="topbar"></header>

    <div class="game-header">
      <div class="game-title">
        <span class="tile-icon" style="background:linear-gradient(150deg,#34d399,#059669); color:#fff;" id="mode-icon"></span>
        <h1>Flashcards</h1>
      </div>
      <div class="hud">
        <div class="hud-stat"><span>Card</span><span id="hud-index">1 / 82</span></div>
        <div class="hud-stat"><span>Known</span><span id="hud-known">0</span></div>
        <button class="btn btn-ghost" id="pause-btn" aria-label="Pause"></button>
      </div>
    </div>

    <div class="progress-bar"><div class="progress-bar-fill" id="progress-fill"></div></div>

    <main class="card-stage">
      <div class="flashcard-wrap">
        <div class="flashcard" id="flashcard" role="button" tabindex="0" aria-label="Flashcard, press to flip">
          <div class="flashcard-face front">
            <div class="acronym-big" id="face-acronym">AAA</div>
            <div class="hint">Tap to reveal</div>
          </div>
          <div class="flashcard-face back">
            <div class="expansion" id="face-expansion"></div>
            <div class="definition" id="face-definition"></div>
          </div>
        </div>
      </div>

      <div class="card-controls">
        <button class="btn btn-ghost" id="prev-btn">&larr; Prev</button>
        <button class="btn btn-primary" id="flip-btn">Flip</button>
        <button class="btn btn-ghost" id="known-btn">I know this ✓</button>
        <button class="btn btn-ghost" id="next-btn">Next &rarr;</button>
      </div>
      <div class="card-controls">
        <button class="btn btn-ghost" id="shuffle-btn"></button>
        <button class="btn btn-ghost" id="restart-btn">Restart deck</button>
      </div>
      <p class="center-note">Keyboard: Space/Enter = flip &middot; ← → = prev/next</p>
    </main>

    <footer class="site-footer" id="site-footer"></footer>
  </div>

  <script src="../js/acronyms-data.js"></script>
  <script src="../js/common.js"></script>
  <script>
    renderTopbar();
    renderFooter("site-footer");
    document.getElementById("pause-btn").innerHTML = ICONS.pause;
    document.getElementById("mode-icon").innerHTML = ICONS.cards;
    document.getElementById("shuffle-btn").innerHTML = `${ICONS.shuffle} Shuffle`;

    const STORAGE_KEY = "aplus-arcade:flashcards:known";
    let deck = shuffleArray(ACRONYMS);
    let index = 0;
    let flipped = false;
    let known = new Set(JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"));

    const cardEl = document.getElementById("flashcard");
    const acronymEl = document.getElementById("face-acronym");
    const expansionEl = document.getElementById("face-expansion");
    const definitionEl = document.getElementById("face-definition");
    const hudIndex = document.getElementById("hud-index");
    const hudKnown = document.getElementById("hud-known");
    const progressFill = document.getElementById("progress-fill");
    const knownBtn = document.getElementById("known-btn");

    function saveKnown() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...known]));
    }

    function render() {
      const item = deck[index];
      acronymEl.textContent = item.acronym;
      expansionEl.textContent = item.expansion;
      definitionEl.textContent = item.definition;
      flipped = false;
      cardEl.classList.remove("is-flipped");
      hudIndex.textContent = `${index + 1} / ${deck.length}`;
      hudKnown.textContent = known.size;
      progressFill.style.width = `${((index + 1) / deck.length) * 100}%`;
      knownBtn.textContent = known.has(item.id) ? "Known ✓ (undo)" : "I know this ✓";
    }

    function flip() {
      flipped = !flipped;
      cardEl.classList.toggle("is-flipped", flipped);
    }

    function go(delta) {
      index = (index + delta + deck.length) % deck.length;
      render();
    }

    cardEl.addEventListener("click", flip);
    cardEl.addEventListener("keydown", (e) => {
      if (e.key === " " || e.key === "Enter") { e.preventDefault(); flip(); }
    });
    document.getElementById("flip-btn").addEventListener("click", flip);
    document.getElementById("prev-btn").addEventListener("click", () => go(-1));
    document.getElementById("next-btn").addEventListener("click", () => go(1));
    document.getElementById("shuffle-btn").addEventListener("click", () => {
      deck = shuffleArray(ACRONYMS);
      index = 0;
      render();
      showToast("Deck shuffled");
    });
    document.getElementById("restart-btn").addEventListener("click", () => {
      known.clear();
      saveKnown();
      deck = shuffleArray(ACRONYMS);
      index = 0;
      render();
      showToast("Deck restarted");
    });
    knownBtn.addEventListener("click", () => {
      const item = deck[index];
      if (known.has(item.id)) known.delete(item.id);
      else known.add(item.id);
      saveKnown();
      render();
    });

    document.addEventListener("keydown", (e) => {
      if (pauseCtl.paused) return;
      if (e.key === "ArrowRight") go(1);
      if (e.key === "ArrowLeft") go(-1);
    });

    const pauseCtl = new PauseController();
    document.getElementById("pause-btn").addEventListener("click", () => pauseCtl.pause());

    render();
  </script>
</body>
</html>
